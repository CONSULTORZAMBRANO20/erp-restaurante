<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arepa ERP · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#f1f0ec;min-height:100vh}
.topbar{background:#1a1d27;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:#f97316;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-name{font-size:15px;font-weight:500;color:#f1f0ec}
.topbar-right{display:flex;align-items:center;gap:8px}
.badge-mes{background:#1e3a2f;color:#4ade80;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;border:1px solid #166534}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:99px;cursor:pointer}
.user-dot{width:22px;height:22px;border-radius:50%;background:#f97316;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.user-name{font-size:12px;color:#9ca3af}
.nav-tabs{background:#1a1d27;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;padding:0 16px;gap:4px;overflow-x:auto}
.nav-tab{padding:12px 14px;font-size:13px;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;text-decoration:none;display:block}
.nav-tab:hover{color:#9ca3af}
.nav-tab.active{color:#fb923c;border-bottom-color:#f97316}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
.section{display:none}
.section.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
@media(min-width:600px){.metrics{grid-template-columns:repeat(4,1fr)}}
.metric{background:#1a1d27;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:16px}
.metric-label{font-size:11px;color:#6b7280;margin-bottom:6px;font-weight:500}
.metric-val{font-size:22px;font-weight:600;color:#f1f0ec}
.metric-sub{font-size:11px;margin-top:4px}
.metric-sub.green{color:#4ade80}
.metric-sub.red{color:#f87171}
.metric-sub.gray{color:#4b5563}
.card{background:#1a1d27;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:500;color:#9ca3af;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em;display:flex;justify-content:space-between;align-items:center}
.nav-btns{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 16px;font-size:13px;color:#9ca3af;cursor:pointer;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:rgba(255,255,255,0.05)}
.nav-btn.orange{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.3);color:#fb923c}
.nav-btn.red{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.25);color:#f87171}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filtro-btn{background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 14px;font-size:12px;color:#6b7280;cursor:pointer;transition:all .15s}
.filtro-btn.active{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.3);color:#fb923c;font-weight:500}
.filtro-input{background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:7px 12px;font-size:12px;color:#9ca3af;outline:none;font-family:inherit}
.filtro-input:focus{border-color:rgba(249,115,22,0.3)}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.tx-item:last-child{border-bottom:none}
.tx-left{display:flex;align-items:center;gap:10px}
.tx-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tx-desc{font-size:13px;color:#e5e7eb;font-weight:500}
.tx-meta{font-size:11px;color:#4b5563;margin-top:2px}
.tx-val{font-size:13px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{font-size:12px;color:#6b7280;width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.bar-val{font-size:12px;color:#9ca3af;width:80px;text-align:right;flex-shrink:0}
.empty{text-align:center;padding:32px;color:#4b5563;font-size:13px}
.logout-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:6px 12px;font-size:12px;color:#f87171;cursor:pointer}
.logout-btn:hover{background:rgba(239,68,68,0.15)}
canvas{max-height:220px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🫓</div>
    <span class="logo-name">Arepa ERP</span>
  </div>
  <div class="topbar-right">
    <div class="badge-mes" id="badgeMes">...</div>
    <div class="user-pill">
      <div class="user-dot" id="userInitial">?</div>
      <span class="user-name" id="userName">...</span>
    </div>
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</div>

<div class="nav-tabs">
  <a class="nav-tab active" onclick="showTab('hoy',this)">Hoy</a>
  <a class="nav-tab" onclick="showTab('mes',this)">Este mes</a>
  <a class="nav-tab" onclick="showTab('anio',this)">Este año</a>
  <a class="nav-tab" onclick="showTab('historial',this)">Historial</a>
</div>

<div class="container">

  <!-- Accesos rápidos -->
  <div class="nav-btns">
    <a href="ventas.html" class="nav-btn orange">+ Nueva venta</a>
    <a href="egresos.html" class="nav-btn red">− Nuevo egreso</a>
    <a href="admin.html" class="nav-btn" style="margin-left:auto">⚙ Admin</a>
  </div>

  <!-- TAB: HOY -->
  <div class="section active" id="tab-hoy">
    <div class="metrics" id="metricsHoy"></div>
    <div class="card">
      <div class="card-title">Ventas por método de pago · Hoy</div>
      <div id="barrasMetodos"></div>
    </div>
    <div class="card">
      <div class="card-title">Últimas transacciones</div>
      <div id="txHoy"></div>
    </div>
  </div>

  <!-- TAB: MES -->
  <div class="section" id="tab-mes">
    <div class="metrics" id="metricsMes"></div>
    <div class="card">
      <div class="card-title">Ventas diarias del mes</div>
      <canvas id="chartMes"></canvas>
    </div>
    <div class="card">
      <div class="card-title">Egresos por categoría</div>
      <div id="barrasCatMes"></div>
    </div>
  </div>

  <!-- TAB: AÑO -->
  <div class="section" id="tab-anio">
    <div class="metrics" id="metricsAnio"></div>
    <div class="card">
      <div class="card-title">Ventas mensuales del año</div>
      <canvas id="chartAnio"></canvas>
    </div>
  </div>

  <!-- TAB: HISTORIAL -->
  <div class="section" id="tab-historial">
    <div class="filtros">
      <button class="filtro-btn active" onclick="filtrarHistorial('ventas',this)">Ventas</button>
      <button class="filtro-btn" onclick="filtrarHistorial('egresos',this)">Egresos</button>
      <input type="date" class="filtro-input" id="filtroDesde" onchange="cargarHistorial()"/>
      <input type="date" class="filtro-input" id="filtroHasta" onchange="cargarHistorial()"/>
    </div>
    <div class="card">
      <div class="card-title">
        <span id="historialTitulo">Ventas</span>
        <span id="historialTotal" style="color:#4ade80;font-size:13px"></span>
      </div>
      <div id="historialLista"></div>
    </div>
  </div>

</div>

<script>
  // ⚠️ REEMPLAZA CON TUS DATOS DE SUPABASE
  const SUPABASE_URL = 'https://snjrcqppawyhzjgqlpkf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuanJjcXBwYXd5aHpqZ3FscGtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzYxNzcsImV4cCI6MjA4OTgxMjE3N30.eoPPwtX_bm00_y5BHyo60oloOXE25RTL_D6RUS3E6-M';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let session = null;
  let chartMes = null;
  let chartAnio = null;
  let historialTipo = 'ventas';

  const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  window.addEventListener('load', async () => {
    const raw = sessionStorage.getItem('erp_user');
    if (!raw) { window.location.href = 'index.html'; return; }
    session = JSON.parse(raw);
    document.getElementById('userName').textContent    = session.nombre;
    document.getElementById('userInitial').textContent = session.nombre.charAt(0).toUpperCase();

    const hoy  = new Date();
    document.getElementById('badgeMes').textContent = MESES[hoy.getMonth()] + ' ' + hoy.getFullYear();

    const hoyStr   = hoy.toISOString().split('T')[0];
    document.getElementById('filtroDesde').value = hoyStr.slice(0,7) + '-01';
    document.getElementById('filtroHasta').value = hoyStr;

    await cargarHoy();
  });

  // ── TABS ──
  function showTab(tab, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    el.classList.add('active');
    if (tab === 'mes')      cargarMes();
    if (tab === 'anio')     cargarAnio();
    if (tab === 'historial') cargarHistorial();
  }

  // ── HOY ──
  async function cargarHoy() {
    const hoy = new Date().toISOString().split('T')[0];

    const [{ data: ventas }, { data: egresos }] = await Promise.all([
      sb.from('ventas').select('valor, metodo_pago_id, descripcion, hora, metodos_pago(nombre)').eq('fecha', hoy).order('created_at', { ascending: false }),
      sb.from('egresos').select('valor, descripcion, hora, categorias_egreso(nombre,color)').eq('fecha', hoy).order('created_at', { ascending: false })
    ]);

    const totalV = (ventas||[]).reduce((s,v) => s + parseFloat(v.valor), 0);
    const totalE = (egresos||[]).reduce((s,e) => s + parseFloat(e.valor), 0);
    const utilidad = totalV - totalE;
    const margen   = totalV > 0 ? ((utilidad / totalV) * 100).toFixed(1) : 0;

    document.getElementById('metricsHoy').innerHTML = `
      ${metricCard('Ventas hoy', '$' + totalV.toLocaleString('es-CO'), ventas?.length + ' transacciones', 'gray')}
      ${metricCard('Egresos hoy', '$' + totalE.toLocaleString('es-CO'), '', 'red')}
      ${metricCard('Utilidad neta', '$' + utilidad.toLocaleString('es-CO'), 'Margen ' + margen + '%', utilidad >= 0 ? 'green' : 'red')}
      ${metricCard('Transacciones', ventas?.length || 0, 'ventas registradas', 'gray')}
    `;

    // Barras por método de pago
    const metodos = {};
    (ventas||[]).forEach(v => {
      const n = v.metodos_pago?.nombre || 'Otro';
      metodos[n] = (metodos[n] || 0) + parseFloat(v.valor);
    });
    const maxM = Math.max(...Object.values(metodos), 1);
    document.getElementById('barrasMetodos').innerHTML = Object.keys(metodos).length === 0
      ? '<div class="empty">Sin ventas hoy</div>'
      : Object.entries(metodos).sort((a,b) => b[1]-a[1]).map(([n,v]) => `
        <div class="bar-row">
          <div class="bar-label">${n}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(v/maxM*100).toFixed(1)}%;background:#f97316"></div></div>
          <div class="bar-val">$${v.toLocaleString('es-CO')}</div>
        </div>`).join('');

    // Últimas transacciones mezcladas
    const todas = [
      ...(ventas||[]).slice(0,8).map(v => ({ tipo:'venta', desc:v.descripcion, meta:v.hora?.slice(0,5) + ' · ' + (v.metodos_pago?.nombre||''), val:parseFloat(v.valor) })),
      ...(egresos||[]).slice(0,4).map(e => ({ tipo:'egreso', desc:e.descripcion, meta:e.hora?.slice(0,5) + ' · ' + (e.categorias_egreso?.nombre||''), val:parseFloat(e.valor), color:e.categorias_egreso?.color }))
    ].slice(0, 12);

    document.getElementById('txHoy').innerHTML = todas.length === 0
      ? '<div class="empty">Sin movimientos hoy</div>'
      : todas.map(t => `
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-dot" style="background:${t.tipo==='venta'?'#4ade80':(t.color||'#f87171')}"></div>
            <div>
              <div class="tx-desc">${t.desc}</div>
              <div class="tx-meta">${t.meta}</div>
            </div>
          </div>
          <div class="tx-val" style="color:${t.tipo==='venta'?'#4ade80':'#f87171'}">${t.tipo==='venta'?'+':'-'}$${t.val.toLocaleString('es-CO')}</div>
        </div>`).join('');
  }

  // ── MES ──
  async function cargarMes() {
    const hoy  = new Date();
    const anio = hoy.getFullYear();
    const mes  = String(hoy.getMonth() + 1).padStart(2, '0');
    const desde = `${anio}-${mes}-01`;
    const hasta = hoy.toISOString().split('T')[0];

    const [{ data: ventas }, { data: egresos }] = await Promise.all([
      sb.from('ventas').select('valor, fecha').gte('fecha', desde).lte('fecha', hasta),
      sb.from('egresos').select('valor, fecha, categoria_id, categorias_egreso(nombre,color)').gte('fecha', desde).lte('fecha', hasta)
    ]);

    const totalV   = (ventas||[]).reduce((s,v) => s + parseFloat(v.valor), 0);
    const totalE   = (egresos||[]).reduce((s,e) => s + parseFloat(e.valor), 0);
    const utilidad = totalV - totalE;
    const margen   = totalV > 0 ? ((utilidad/totalV)*100).toFixed(1) : 0;

    document.getElementById('metricsMes').innerHTML = `
      ${metricCard('Ventas del mes', '$' + totalV.toLocaleString('es-CO'), ventas?.length + ' transacciones', 'gray')}
      ${metricCard('Egresos del mes', '$' + totalE.toLocaleString('es-CO'), '', 'red')}
      ${metricCard('Utilidad del mes', '$' + utilidad.toLocaleString('es-CO'), 'Margen ' + margen + '%', utilidad >= 0 ? 'green' : 'red')}
      ${metricCard('Días activos', [...new Set((ventas||[]).map(v=>v.fecha))].length, 'con ventas', 'gray')}
    `;

    // Gráfica de ventas diarias
    const porDia = {};
    (ventas||[]).forEach(v => { porDia[v.fecha] = (porDia[v.fecha]||0) + parseFloat(v.valor); });
    const labels = Object.keys(porDia).sort().map(d => d.slice(8));
    const vals   = labels.map(d => {
      const key = `${anio}-${mes}-${d}`;
      return porDia[key] || 0;
    });

    if (chartMes) chartMes.destroy();
    const ctx = document.getElementById('chartMes').getContext('2d');
    chartMes = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ data: vals, backgroundColor: 'rgba(249,115,22,0.7)', borderRadius: 4, borderSkipped: false }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6b7280', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } }, y: { ticks: { color: '#6b7280', font: { size: 11 }, callback: v => '$' + v.toLocaleString('es-CO') }, grid: { color: 'rgba(255,255,255,0.04)' } } } }
    });

    // Barras por categoría
    const cats = {};
    (egresos||[]).forEach(e => {
      const n = e.categorias_egreso?.nombre || 'Otro';
      const c = e.categorias_egreso?.color  || '#6b7280';
      if (!cats[n]) cats[n] = { val: 0, color: c };
      cats[n].val += parseFloat(e.valor);
    });
    const maxC = Math.max(...Object.values(cats).map(c=>c.val), 1);
    document.getElementById('barrasCatMes').innerHTML = Object.keys(cats).length === 0
      ? '<div class="empty">Sin egresos este mes</div>'
      : Object.entries(cats).sort((a,b) => b[1].val - a[1].val).map(([n,c]) => `
        <div class="bar-row">
          <div class="bar-label">${n}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c.val/maxC*100).toFixed(1)}%;background:${c.color}"></div></div>
          <div class="bar-val">$${c.val.toLocaleString('es-CO')}</div>
        </div>`).join('');
  }

  // ── AÑO ──
  async function cargarAnio() {
    const anio  = new Date().getFullYear();
    const desde = `${anio}-01-01`;
    const hasta = `${anio}-12-31`;

    const [{ data: ventas }, { data: egresos }] = await Promise.all([
      sb.from('ventas').select('valor, fecha').gte('fecha', desde).lte('fecha', hasta),
      sb.from('egresos').select('valor, fecha').gte('fecha', desde).lte('fecha', hasta)
    ]);

    const totalV   = (ventas||[]).reduce((s,v) => s + parseFloat(v.valor), 0);
    const totalE   = (egresos||[]).reduce((s,e) => s + parseFloat(e.valor), 0);
    const utilidad = totalV - totalE;
    const margen   = totalV > 0 ? ((utilidad/totalV)*100).toFixed(1) : 0;

    document.getElementById('metricsAnio').innerHTML = `
      ${metricCard('Ventas del año', '$' + totalV.toLocaleString('es-CO'), '', 'gray')}
      ${metricCard('Egresos del año', '$' + totalE.toLocaleString('es-CO'), '', 'red')}
      ${metricCard('Utilidad del año', '$' + utilidad.toLocaleString('es-CO'), 'Margen ' + margen + '%', utilidad >= 0 ? 'green' : 'red')}
      ${metricCard('Meses activos', [...new Set((ventas||[]).map(v=>v.fecha.slice(0,7)))].length, 'con ventas', 'gray')}
    `;

    const porMes = {};
    (ventas||[]).forEach(v => {
      const m = parseInt(v.fecha.slice(5,7)) - 1;
      porMes[m] = (porMes[m]||0) + parseFloat(v.valor);
    });
    const labelsA = MESES;
    const valsA   = labelsA.map((_,i) => porMes[i] || 0);

    if (chartAnio) chartAnio.destroy();
    const ctx = document.getElementById('chartAnio').getContext('2d');
    chartAnio = new Chart(ctx, {
      type: 'bar',
      data: { labels: labelsA, datasets: [{ data: valsA, backgroundColor: 'rgba(249,115,22,0.7)', borderRadius: 4, borderSkipped: false }] },
      options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6b7280', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } }, y: { ticks: { color: '#6b7280', font: { size: 11 }, callback: v => '$' + v.toLocaleString('es-CO') }, grid: { color: 'rgba(255,255,255,0.04)' } } } }
    });
  }

  // ── HISTORIAL ──
  function filtrarHistorial(tipo, el) {
    historialTipo = tipo;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('historialTitulo').textContent = tipo === 'ventas' ? 'Ventas' : 'Egresos';
    cargarHistorial();
  }

  async function cargarHistorial() {
    const desde = document.getElementById('filtroDesde').value;
    const hasta = document.getElementById('filtroHasta').value;
    if (!desde || !hasta) return;

    let data, error;
    if (historialTipo === 'ventas') {
      ({ data, error } = await sb.from('ventas').select('*, metodos_pago(nombre)').gte('fecha', desde).lte('fecha', hasta).order('fecha', { ascending: false }).order('hora', { ascending: false }));
    } else {
      ({ data, error } = await sb.from('egresos').select('*, categorias_egreso(nombre,color)').gte('fecha', desde).lte('fecha', hasta).order('fecha', { ascending: false }).order('hora', { ascending: false }));
    }

    const total = (data||[]).reduce((s,r) => s + parseFloat(r.valor), 0);
    document.getElementById('historialTotal').textContent = '$' + total.toLocaleString('es-CO');

    const lista = document.getElementById('historialLista');
    if (!data || data.length === 0) { lista.innerHTML = '<div class="empty">Sin registros en este período</div>'; return; }

    lista.innerHTML = data.map(r => {
      const esVenta = historialTipo === 'ventas';
      const meta    = esVenta
        ? `${r.fecha} · ${r.hora?.slice(0,5)} · ${r.metodos_pago?.nombre||''}`
        : `${r.fecha} · ${r.hora?.slice(0,5)} · ${r.categorias_egreso?.nombre||''} ${r.proveedor?'· '+r.proveedor:''}`;
      const color   = esVenta ? '#4ade80' : (r.categorias_egreso?.color||'#f87171');
      const valColor = esVenta ? '#4ade80' : '#f87171';
      const signo   = esVenta ? '+' : '-';
      return `
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-dot" style="background:${color}"></div>
            <div>
              <div class="tx-desc">${r.descripcion}</div>
              <div class="tx-meta">${meta}</div>
            </div>
          </div>
          <div class="tx-val" style="color:${valColor}">${signo}$${parseFloat(r.valor).toLocaleString('es-CO')}</div>
        </div>`;
    }).join('');
  }

  // ── HELPERS ──
  function metricCard(label, val, sub, tipo) {
    const subColor = tipo === 'green' ? '#4ade80' : tipo === 'red' ? '#f87171' : '#4b5563';
    return `<div class="metric">
      <div class="metric-label">${label}</div>
      <div class="metric-val">${val}</div>
      ${sub ? `<div class="metric-sub" style="color:${subColor}">${sub}</div>` : ''}
    </div>`;
  }

  function logout() {
    sessionStorage.removeItem('erp_user');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
