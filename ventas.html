<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arepa Yennitas · Ventas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#f1f0ec;min-height:100vh}
.topbar{background:#1a1d27;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.back-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:6px 12px;font-size:13px;color:#9ca3af;cursor:pointer;text-decoration:none}
.page-title{font-size:15px;font-weight:500;color:#f1f0ec}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);padding:4px 10px;border-radius:99px}
.user-dot{width:22px;height:22px;border-radius:50%;background:#f97316;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.user-name{font-size:12px;color:#9ca3af}
.layout{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:720px){.layout{grid-template-columns:1fr 340px;height:calc(100vh - 56px)}}
.catalogo-panel{padding:16px;overflow-y:auto}
@media(min-width:720px){.catalogo-panel{height:calc(100vh - 56px)}}
.orden-panel{background:#1a1d27;border-top:1px solid rgba(255,255,255,0.07);padding:16px}
@media(min-width:720px){.orden-panel{border-top:none;border-left:1px solid rgba(255,255,255,0.07);height:calc(100vh - 56px);overflow-y:auto;display:flex;flex-direction:column}}
.cat-title{font-size:11px;font-weight:500;color:#f97316;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-left:2px}
.cat-title:first-child{margin-top:0}
.productos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:4px}
.prod-card{background:#1a1d27;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:12px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.prod-card:hover{border-color:rgba(249,115,22,0.3);background:rgba(249,115,22,0.05)}
.prod-card.tiene-cantidad{border-color:rgba(249,115,22,0.5);background:rgba(249,115,22,0.08)}
.prod-nombre{font-size:12px;font-weight:500;color:#f1f0ec;line-height:1.4;margin-bottom:6px}
.prod-precio{font-size:13px;color:#fb923c;font-weight:600}
.prod-qty-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:26px;height:26px;border-radius:7px;background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);color:#fb923c;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-shrink:0;line-height:1}
.qty-btn:hover{background:rgba(249,115,22,0.3)}
.qty-num{font-size:15px;font-weight:600;color:#f1f0ec;min-width:20px;text-align:center}
.prod-sub{font-size:11px;color:#4ade80;font-weight:500}
.orden-title{font-size:13px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.orden-empty{text-align:center;padding:32px 16px;color:#374151;font-size:13px;flex:1;display:flex;align-items:center;justify-content:center}
.orden-items{flex:1;overflow-y:auto}
.orden-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.orden-item:last-child{border-bottom:none}
.oi-left{flex:1;min-width:0}
.oi-nombre{font-size:12px;font-weight:500;color:#f1f0ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oi-meta{font-size:11px;color:#6b7280;margin-top:2px}
.oi-val{font-size:13px;font-weight:600;color:#4ade80;margin-left:10px;flex-shrink:0}
.orden-footer{margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.total-label{font-size:13px;color:#6b7280}
.total-val{font-size:24px;font-weight:600;color:#4ade80}
.metodos-label{font-size:11px;color:#6b7280;margin-bottom:8px;font-weight:500}
.metodos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.metodo-btn{background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.metodo-btn:hover{border-color:rgba(249,115,22,0.3)}
.metodo-btn.selected{background:rgba(249,115,22,0.12);border-color:rgba(249,115,22,0.5)}
.metodo-icono{font-size:16px;margin-bottom:3px}
.metodo-nombre{font-size:10px;color:#9ca3af;font-weight:500}
.metodo-btn.selected .metodo-nombre{color:#fb923c}
.notas-field{margin-bottom:12px}
.notas-field label{display:block;font-size:11px;color:#6b7280;margin-bottom:5px;font-weight:500}
.notas-field textarea{width:100%;background:#0f1117;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:9px 12px;font-size:13px;color:#f1f0ec;outline:none;resize:none;height:56px;font-family:inherit}
.notas-field textarea:focus{border-color:rgba(249,115,22,0.4)}
.btn-guardar{width:100%;background:#f97316;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-guardar:hover{background:#ea6c0a}
.btn-guardar:disabled{background:#1f2937;color:#4b5563;cursor:not-allowed}
.btn-limpiar{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px;font-size:13px;color:#6b7280;cursor:pointer;margin-top:8px;transition:all .2s}
.btn-limpiar:hover{border-color:rgba(239,68,68,0.3);color:#f87171}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn-guardar.loading .spinner{display:block}
.btn-guardar.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1d27;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:10px;font-size:14px;color:#f1f0ec;transition:transform .3s ease;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success .ti{color:#4ade80;font-size:16px}
.toast.error .ti{color:#f87171;font-size:16px}
.historial-section{padding:16px;border-top:1px solid rgba(255,255,255,0.06)}
@media(min-width:720px){.historial-section{display:none}}
.hist-title{font-size:13px;font-weight:500;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;justify-content:space-between}
.hist-item{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.hist-item:last-child{border-bottom:none}
.hist-desc{font-size:12px;color:#e5e7eb;font-weight:500}
.hist-meta{font-size:11px;color:#4b5563;margin-top:2px}
.hist-val{font-size:13px;font-weight:600;color:#4ade80;flex-shrink:0;margin-left:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="dashboard.html" class="back-btn">← Volver</a>
    <span class="page-title">Nueva venta</span>
  </div>
  <div class="user-pill">
    <div class="user-dot" id="userInitial">?</div>
    <span class="user-name" id="userName">...</span>
  </div>
</div>

<div class="layout">

  <!-- CATÁLOGO -->
  <div class="catalogo-panel" id="catalogoPanel">
    <div id="catalogoContenido"></div>
  </div>

  <!-- ORDEN -->
  <div class="orden-panel">
    <div class="orden-title">Orden actual</div>
    <div class="orden-items" id="ordenItems">
      <div class="orden-empty">Selecciona productos del catálogo</div>
    </div>
    <div class="orden-footer">
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-val" id="totalOrden">$0</span>
      </div>
      <div class="metodos-label">Método de pago</div>
      <div class="metodos-grid" id="metodosGrid"></div>
      <div class="notas-field">
        <label>Notas opcionales</label>
        <textarea id="notas" placeholder="Sin picante, para llevar..."></textarea>
      </div>
      <button class="btn-guardar" id="btnGuardar" onclick="guardarVenta()">
        <div class="spinner"></div>
        <span class="btn-text">Registrar venta</span>
      </button>
      <button class="btn-limpiar" onclick="limpiarOrden()">Limpiar orden</button>
    </div>
  </div>

</div>

<!-- Historial móvil -->
<div class="historial-section">
  <div class="hist-title">
    <span>Ventas de hoy</span>
    <span id="totalHoy" style="color:#4ade80;font-weight:500;font-size:13px">$0</span>
  </div>
  <div id="historialLista"></div>
</div>

<div class="toast" id="toast">
  <span class="ti" id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
  // ⚠️ REEMPLAZA CON TUS DATOS DE SUPABASE
  const SUPABASE_URL = 'https://snjrcqppawyhzjgqlpkf.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuanJjcXBwYXd5aHpqZ3FscGtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMzYxNzcsImV4cCI6MjA4OTgxMjE3N30.eoPPwtX_bm00_y5BHyo60oloOXE25RTL_D6RUS3E6-M';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let session = null;
  let orden = {};
  let productos = [];
  let metodoSeleccionado = null;

  const ICONOS = {
    'Efectivo':'💵','Nequi':'📱','Daviplata':'📲',
    'Transferencia':'🏦','Tarjeta débito':'💳','Tarjeta crédito':'💳'
  };

  window.addEventListener('load', async () => {
    const raw = sessionStorage.getItem('erp_user');
    if (!raw) { window.location.href = 'index.html'; return; }
    session = JSON.parse(raw);
    document.getElementById('userName').textContent    = session.nombre;
    document.getElementById('userInitial').textContent = session.nombre.charAt(0).toUpperCase();
    await Promise.all([cargarCatalogo(), cargarMetodos(), cargarHistorial()]);
  });

  async function cargarCatalogo() {
    const { data } = await sb.from('productos').select('*').eq('disponible', true).order('orden');
    productos = data || [];
    const categorias = [...new Set(productos.map(p => p.categoria))];
    const contenido  = document.getElementById('catalogoContenido');
    contenido.innerHTML = '';

    categorias.forEach(cat => {
      const titulo = document.createElement('div');
      titulo.className = 'cat-title';
      titulo.textContent = cat;
      contenido.appendChild(titulo);

      const grid = document.createElement('div');
      grid.className = 'productos-grid';

      productos.filter(p => p.categoria === cat).forEach(p => {
        const card = document.createElement('div');
        card.className = 'prod-card';
        card.id = 'card-' + p.id;
        card.innerHTML = `
          <div class="prod-nombre">${p.nombre}</div>
          <div class="prod-qty-row">
            <div class="prod-precio">$${parseInt(p.precio).toLocaleString('es-CO')}</div>
          </div>
          <div class="prod-qty-row" style="margin-top:8px">
            <div class="qty-ctrl">
              <div class="qty-btn" onclick="cambiarCantidad(${p.id}, -1, event)">−</div>
              <div class="qty-num" id="qty-${p.id}">0</div>
              <div class="qty-btn" onclick="cambiarCantidad(${p.id}, 1, event)">+</div>
            </div>
            <div class="prod-sub" id="sub-${p.id}"></div>
          </div>`;
        card.onclick = () => cambiarCantidad(p.id, 1);
        grid.appendChild(card);
      });

      contenido.appendChild(grid);
    });
  }

  async function cargarMetodos() {
    const { data } = await sb.from('metodos_pago').select('*').eq('activo', true).order('id');
    const grid = document.getElementById('metodosGrid');
    grid.innerHTML = '';
    (data || []).forEach(m => {
      const div = document.createElement('div');
      div.className = 'metodo-btn';
      div.id = 'metodo-' + m.id;
      div.innerHTML = `<div class="metodo-icono">${ICONOS[m.nombre]||'💰'}</div><div class="metodo-nombre">${m.nombre}</div>`;
      div.onclick = () => seleccionarMetodo(m.id, m.nombre, div);
      grid.appendChild(div);
    });
  }

  function seleccionarMetodo(id, nombre, el) {
    document.querySelectorAll('.metodo-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    metodoSeleccionado = { id, nombre };
  }

  function cambiarCantidad(productoId, delta, event) {
    if (event) event.stopPropagation();
    const actual  = orden[productoId] || 0;
    const nueva   = Math.max(0, actual + delta);
    if (nueva === 0) delete orden[productoId];
    else orden[productoId] = nueva;

    const producto = productos.find(p => p.id === productoId);
    const card     = document.getElementById('card-' + productoId);
    const qtyEl    = document.getElementById('qty-' + productoId);
    const subEl    = document.getElementById('sub-' + productoId);

    qtyEl.textContent = nueva;
    if (nueva > 0) {
      subEl.textContent = '$' + (nueva * parseInt(producto.precio)).toLocaleString('es-CO');
      card.classList.add('tiene-cantidad');
    } else {
      subEl.textContent = '';
      card.classList.remove('tiene-cantidad');
    }
    actualizarOrden();
  }

  function actualizarOrden() {
    const items  = Object.entries(orden);
    const lista  = document.getElementById('ordenItems');
    const totalEl = document.getElementById('totalOrden');
    let total = 0;

    if (items.length === 0) {
      lista.innerHTML = '<div class="orden-empty">Selecciona productos del catálogo</div>';
      totalEl.textContent = '$0';
      return;
    }

    lista.innerHTML = items.map(([id, qty]) => {
      const p   = productos.find(x => x.id === parseInt(id));
      const sub = qty * parseInt(p.precio);
      total    += sub;
      return `<div class="orden-item">
        <div class="oi-left">
          <div class="oi-nombre">${p.nombre}</div>
          <div class="oi-meta">${qty} × $${parseInt(p.precio).toLocaleString('es-CO')}</div>
        </div>
        <div class="oi-val">$${sub.toLocaleString('es-CO')}</div>
      </div>`;
    }).join('');

    totalEl.textContent = '$' + total.toLocaleString('es-CO');
  }

  async function guardarVenta() {
    const items = Object.entries(orden);
    if (items.length === 0)        { toast('Agrega al menos un producto', 'error'); return; }
    if (!metodoSeleccionado)       { toast('Selecciona el método de pago', 'error'); return; }

    const btn   = document.getElementById('btnGuardar');
    btn.classList.add('loading');
    btn.disabled = true;

    const total = items.reduce((s, [id, qty]) => {
      const p = productos.find(x => x.id === parseInt(id));
      return s + qty * parseInt(p.precio);
    }, 0);

    const resumen = items.map(([id, qty]) => {
      const p = productos.find(x => x.id === parseInt(id));
      return `${qty}x ${p.nombre}`;
    }).join(', ');

    const hoy   = new Date();
    const fecha = hoy.toISOString().split('T')[0];
    const hora  = hoy.toTimeString().split(' ')[0];
    const notas = document.getElementById('notas').value.trim();

    const { data: ventaData, error: ventaError } = await sb.from('ventas').insert({
      descripcion:    resumen,
      valor:          total,
      metodo_pago_id: metodoSeleccionado.id,
      usuario:        session.usuario,
      notas:          notas || null,
      fecha, hora
    }).select('id').single();

    if (ventaError) {
      toast('Error al guardar. Intenta de nuevo.', 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    const ventaItems = items.map(([id, qty]) => {
      const p = productos.find(x => x.id === parseInt(id));
      return {
        venta_id:        ventaData.id,
        producto_id:     p.id,
        nombre_producto: p.nombre,
        precio_unitario: parseInt(p.precio),
        cantidad:        qty,
        subtotal:        qty * parseInt(p.precio)
      };
    });

    await sb.from('venta_items').insert(ventaItems);

    btn.classList.remove('loading');
    btn.disabled = false;

    toast('Venta registrada — $' + total.toLocaleString('es-CO'), 'success');
    limpiarOrden();
    await cargarHistorial();
  }

  function limpiarOrden() {
    orden = {};
    metodoSeleccionado = null;
    document.getElementById('notas').value = '';
    document.querySelectorAll('.metodo-btn').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.prod-card').forEach(c => c.classList.remove('tiene-cantidad'));
    productos.forEach(p => {
      const q = document.getElementById('qty-' + p.id);
      const s = document.getElementById('sub-' + p.id);
      if (q) q.textContent = '0';
      if (s) s.textContent = '';
    });
    actualizarOrden();
  }

  async function cargarHistorial() {
    const hoy = new Date().toISOString().split('T')[0];
    const { data } = await sb.from('ventas')
      .select('descripcion, valor, hora, metodos_pago(nombre)')
      .eq('fecha', hoy).order('created_at', { ascending: false }).limit(15);

    const total = (data||[]).reduce((s,v) => s + parseFloat(v.valor), 0);
    document.getElementById('totalHoy').textContent = '$' + total.toLocaleString('es-CO');

    const lista = document.getElementById('historialLista');
    if (!data || data.length === 0) { lista.innerHTML = '<div style="text-align:center;padding:20px;color:#374151;font-size:13px">Sin ventas hoy</div>'; return; }
    lista.innerHTML = data.map(v => `
      <div class="hist-item">
        <div>
          <div class="hist-desc">${v.descripcion}</div>
          <div class="hist-meta">${v.hora?.slice(0,5)||''} · ${v.metodos_pago?.nombre||''}</div>
        </div>
        <div class="hist-val">+$${parseFloat(v.valor).toLocaleString('es-CO')}</div>
      </div>`).join('');
  }

  function toast(msg, tipo = 'success') {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent  = msg;
    document.getElementById('toastIcon').textContent = tipo === 'success' ? '✓' : '✕';
    t.className = `toast ${tipo}`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
