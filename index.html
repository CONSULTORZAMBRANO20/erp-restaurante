<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Arepa ERP · Acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1d27;border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px 36px;width:100%;max-width:380px}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
  .logo-icon{width:44px;height:44px;background:#f97316;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .logo-text h1{font-size:18px;font-weight:600;color:#f1f0ec}
  .logo-text p{font-size:12px;color:#6b7280;margin-top:2px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;color:#9ca3af;margin-bottom:6px;font-weight:500}
  .field input{width:100%;background:#0f1117;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:11px 14px;font-size:14px;color:#f1f0ec;outline:none;transition:border .2s}
  .field input:focus{border-color:rgba(249,115,22,0.6)}
  .field input::placeholder{color:#374151}
  .btn{width:100%;background:#f97316;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;margin-top:8px;transition:background .2s}
  .btn:hover{background:#ea6c0a}
  .btn:disabled{background:#374151;cursor:not-allowed;color:#6b7280}
  .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-top:14px;display:none}
  .badge{display:inline-block;background:#1e3a2f;color:#4ade80;font-size:11px;padding:3px 10px;border-radius:99px;border:1px solid #166534;margin-bottom:28px}
  .pin-hint{font-size:11px;color:#4b5563;text-align:center;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🫓</div>
    <div class="logo-text">
      <h1>Arepa ERP</h1>
      <p>Sistema de gestión</p>
    </div>
  </div>

  <div class="badge">Sistema activo</div>

  <div class="field">
    <label>Usuario</label>
    <input type="text" id="usuario" placeholder="admin" autocomplete="off"/>
  </div>
  <div class="field">
    <label>PIN de acceso</label>
    <input type="password" id="pin" placeholder="••••" maxlength="8"/>
  </div>

  <button class="btn" id="btnLogin" onclick="login()">Ingresar al sistema</button>
  <div class="error" id="error"></div>
  <p class="pin-hint">¿Olvidaste tu PIN? Contacta al administrador</p>
</div>

<script>
  // ⚠️ REEMPLAZA ESTAS DOS LÍNEAS CON TUS DATOS DE SUPABASE
  const SUPABASE_URL  = 'https://snjrcqppawyhzjgqlpkf.supabase.co';
  const SUPABASE_KEY  = 'snjrcqppawyhzjgqlpkf';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function login() {
    const usuario = document.getElementById('usuario').value.trim();
    const pin     = document.getElementById('pin').value.trim();
    const btn     = document.getElementById('btnLogin');
    const err     = document.getElementById('error');

    err.style.display = 'none';

    if (!usuario || !pin) {
      mostrarError('Ingresa tu usuario y PIN');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Verificando...';

    try {
      const hoy  = new Date();
      const mes  = hoy.getMonth() + 1;
      const anio = hoy.getFullYear();

      const { data: lic } = await sb
        .from('licencias')
        .select('activa')
        .eq('mes', mes)
        .eq('anio', anio)
        .eq('activa', true)
        .single();

      if (!lic) {
        mostrarError('Sistema inactivo este mes. Contacta al proveedor.');
        btn.disabled    = false;
        btn.textContent = 'Ingresar al sistema';
        return;
      }

      const { data: user } = await sb
        .from('usuarios')
        .select('id, nombre, rol')
        .eq('usuario', usuario)
        .eq('pin', pin)
        .eq('activo', true)
        .single();

      if (!user) {
        mostrarError('Usuario o PIN incorrecto');
        btn.disabled    = false;
        btn.textContent = 'Ingresar al sistema';
        return;
      }

      sessionStorage.setItem('erp_user', JSON.stringify({
        id:      user.id,
        nombre:  user.nombre,
        rol:     user.rol,
        usuario: usuario
      }));

      window.location.href = 'dashboard.html';

    } catch (e) {
      mostrarError('Error de conexión. Verifica tu internet.');
      btn.disabled    = false;
      btn.textContent = 'Ingresar al sistema';
    }
  }

  function mostrarError(msg) {
    const err       = document.getElementById('error');
    err.textContent = msg;
    err.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
